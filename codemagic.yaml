workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store   # change to 'ad_hoc' for direct install without App Store
        bundle_identifier: com.tick.app
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install Capacitor iOS platform
        script: |
          npm install @capacitor/ios
          npx cap add ios || true   # 'true' so it doesn't fail if already added

      - name: Prepare web assets
        script: npm run prepare:web

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Set bundle identifier
        script: |
          cd ios/App
          xcrun agvtool new-version -all $BUILD_NUMBER
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleIdentifier com.tick.app" \
            App/Info.plist

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "ios/App/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration   # connect your Apple account in Codemagic > Integrations

      email:
        recipients:
          - ogunbarwofemi2000@gmail.com
        notify:
          success: true
          failure: true
